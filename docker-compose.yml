services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: courierops
      POSTGRES_USER: courierops
      POSTGRES_PASSWORD: courierops_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://courierops:courierops_dev_password@database:5432/courierops
      JWT_SECRET_KEY: local_access_secret_change_me
      JWT_REFRESH_SECRET_KEY: local_refresh_secret_change_me
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      - database

volumes:
  postgres_data:
